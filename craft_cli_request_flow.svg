<svg width="100%" viewBox="0 0 680 680">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── STEP 1: LLM spawns craft ───────────────────────────────────── -->
<g class="node c-purple" onclick="sendPrompt('How does the LLM spawn the craft process?')">
  <rect x="220" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">LLM spawns craft process</text>
</g>

<line x1="340" y1="74" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>

<!-- ── STEP 2: connect attempt ────────────────────────────────────── -->
<g class="node c-gray" onclick="sendPrompt('What happens during the daemon connection attempt?')">
  <rect x="200" y="110" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="132" text-anchor="middle" dominant-baseline="central">connect() to daemon.sock</text>
</g>

<!-- success branch down -->
<line x1="340" y1="154" x2="340" y2="186" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="173" dominant-baseline="central">connected</text>

<!-- failure branch right -->
<line x1="480" y1="132" x2="560" y2="132" class="arr" stroke="#854F0B" marker-end="url(#arrow)"/>
<text class="ts" x="518" y="124" text-anchor="middle">refused</text>

<!-- ── DAEMON DOWN BRANCH ──────────────────────────────────────────── -->
<g class="node c-amber" onclick="sendPrompt('What happens when the daemon is not running?')">
  <rect x="560" y="110" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="610" y="132" text-anchor="middle" dominant-baseline="central">spawn daemon</text>
</g>

<!-- poll loop arrow down then back -->
<line x1="610" y1="154" x2="610" y2="188" class="arr" stroke="#854F0B" marker-end="url(#arrow)"/>

<g class="node c-amber" onclick="sendPrompt('How does the fast-poll retry work?')">
  <rect x="548" y="192" width="124" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="610" y="207" text-anchor="middle" dominant-baseline="central">poll 10× / 20 ms</text>
  <text class="ts" x="610" y="225" text-anchor="middle" dominant-baseline="central">200 ms max budget</text>
</g>

<!-- timeout branch -->
<line x1="548" y1="210" x2="480" y2="210" class="arr" stroke="#854F0B" marker-end="url(#arrow)"/>
<text class="ts" x="512" y="202" text-anchor="middle">timeout</text>

<g class="node c-amber" onclick="sendPrompt('What JSON-RPC error does craft return on timeout?')">
  <rect x="348" y="192" width="128" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="412" y="207" text-anchor="middle" dominant-baseline="central">write JSON-RPC</text>
  <text class="ts" x="412" y="225" text-anchor="middle" dominant-baseline="central">error · retry: true</text>
</g>

<!-- poll success arrow left back to main flow -->
<line x1="610" y1="236" x2="610" y2="270" fill="none" stroke="#888780" stroke-width="0.5"/>
<path d="M610 270 L340 270" fill="none" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="490" y="263" text-anchor="middle">socket ready</text>

<!-- ── STEP 3: MODULE LOOKUP ───────────────────────────────────────── -->
<g class="node c-gray" onclick="sendPrompt('How does the daemon look up a plugin module?')">
  <rect x="200" y="190" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="212" text-anchor="middle" dominant-baseline="central">daemon looks up module</text>
</g>

<!-- plugin not found branch left -->
<line x1="200" y1="212" x2="140" y2="212" class="arr" stroke="#854F0B" marker-end="url(#arrow)"/>
<text class="ts" x="168" y="204" text-anchor="middle">not found</text>

<g class="node c-amber" onclick="sendPrompt('What happens if a plugin is not installed?')">
  <rect x="40" y="192" width="96" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="88" y="207" text-anchor="middle" dominant-baseline="central">JSON-RPC err</text>
  <text class="ts" x="88" y="225" text-anchor="middle" dominant-baseline="central">retry: false</text>
</g>

<line x1="340" y1="234" x2="340" y2="266" class="arr" marker-end="url(#arrow)"/>

<!-- ── STEP 4: CREDENTIAL LOAD ────────────────────────────────────── -->
<g class="node c-gray" onclick="sendPrompt('How are credentials loaded and injected?')">
  <rect x="200" y="270" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">load credentials from keychain</text>
</g>

<line x1="340" y1="314" x2="340" y2="346" class="arr" marker-end="url(#arrow)"/>

<!-- ── STEP 5: EPHEMERAL INSTANCE ─────────────────────────────────── -->
<g class="node c-teal" onclick="sendPrompt('How is a fresh wasmtime Store created?')">
  <rect x="200" y="350" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="371" text-anchor="middle" dominant-baseline="central">create Store + WasiCtx</text>
  <text class="ts" x="340" y="389" text-anchor="middle" dominant-baseline="central">fresh per call · credentials injected</text>
</g>

<line x1="340" y1="406" x2="340" y2="438" class="arr" marker-end="url(#arrow)"/>

<!-- ── STEP 6: EXECUTION ───────────────────────────────────────────── -->
<g class="node c-teal" onclick="sendPrompt('What happens during plugin execution?')">
  <rect x="200" y="442" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="463" text-anchor="middle" dominant-baseline="central">execute _start()</text>
  <text class="ts" x="340" y="481" text-anchor="middle" dominant-baseline="central">JSON-RPC over stdio · 30 s timeout</text>
</g>

<!-- wasm trap branch right -->
<line x1="480" y1="470" x2="540" y2="470" class="arr" stroke="#854F0B" marker-end="url(#arrow)"/>
<text class="ts" x="508" y="462" text-anchor="middle">trap</text>

<g class="node c-amber" onclick="sendPrompt('What happens on a WASM trap or timeout?')">
  <rect x="540" y="450" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="595" y="465" text-anchor="middle" dominant-baseline="central">JSON-RPC err</text>
  <text class="ts" x="595" y="483" text-anchor="middle" dominant-baseline="central">retry: true</text>
</g>

<line x1="340" y1="498" x2="340" y2="530" class="arr" marker-end="url(#arrow)"/>

<!-- ── STEP 7: CLEANUP ─────────────────────────────────────────────── -->
<g class="node c-gray" onclick="sendPrompt('How is memory freed after a plugin call?')">
  <rect x="200" y="534" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="554" text-anchor="middle" dominant-baseline="central">client disconnects</text>
  <text class="ts" x="340" y="572" text-anchor="middle" dominant-baseline="central">Store + Instance drop · RAM freed</text>
</g>

<line x1="340" y1="590" x2="340" y2="622" class="arr" marker-end="url(#arrow)"/>

<!-- ── IDLE TIMER ─────────────────────────────────────────────────── -->
<g class="node c-gray" onclick="sendPrompt('When does the daemon auto-shutdown?')">
  <rect x="200" y="626" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="647" text-anchor="middle" dominant-baseline="central">idle timer updated</text>
</g>

<!-- idle shutdown branch left -->
<line x1="200" y1="648" x2="140" y2="648" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

<g class="node c-gray" onclick="sendPrompt('What triggers daemon idle shutdown?')">
  <rect x="40" y="628" width="96" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="88" y="643" text-anchor="middle" dominant-baseline="central">5 min idle</text>
  <text class="ts" x="88" y="661" text-anchor="middle" dominant-baseline="central">daemon exits</text>
</g>

<!-- step labels left spine -->
<text class="ts" x="184" y="52" text-anchor="end" dominant-baseline="central">1</text>
<text class="ts" x="184" y="132" text-anchor="end" dominant-baseline="central">2</text>
<text class="ts" x="184" y="212" text-anchor="end" dominant-baseline="central">3</text>
<text class="ts" x="184" y="292" text-anchor="end" dominant-baseline="central">4</text>
<text class="ts" x="184" y="378" text-anchor="end" dominant-baseline="central">5</text>
<text class="ts" x="184" y="470" text-anchor="end" dominant-baseline="central">6</text>
<text class="ts" x="184" y="562" text-anchor="end" dominant-baseline="central">7</text>

</svg>
