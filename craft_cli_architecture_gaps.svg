<svg width="100%" viewBox="0 0 680 620">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- LLM Agent -->
<g class="node c-purple">
  <rect x="40" y="30" width="140" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="50" text-anchor="middle" dominant-baseline="central">LLM agent</text>
  <text class="ts" x="110" y="66" text-anchor="middle" dominant-baseline="central">spawns craft process</text>
</g>

<!-- CLI Client -->
<g class="node c-blue">
  <rect x="40" y="140" width="140" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="160" text-anchor="middle" dominant-baseline="central">craft client</text>
  <text class="ts" x="110" y="176" text-anchor="middle" dominant-baseline="central">stdio pipe + IPC</text>
</g>

<!-- Arrow LLM → Client -->
<line x1="110" y1="78" x2="110" y2="138" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="118" y="115" dominant-baseline="central">new process per call</text>

<!-- GAP 1: Process startup cost -->
<rect x="32" y="96" width="160" height="18" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="112" y="105" text-anchor="middle" dominant-baseline="central" fill="#633806">⚠ gap: cold-start latency</text>

<!-- Daemon -->
<g class="c-teal">
  <rect x="270" y="80" width="260" height="340" rx="14" stroke-width="0.5"/>
  <text class="th" x="400" y="108" text-anchor="middle" dominant-baseline="central">background daemon</text>
</g>

<!-- Daemon internals -->
<g class="node c-teal">
  <rect x="290" y="120" width="220" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="400" y="138" text-anchor="middle" dominant-baseline="central">IPC listener</text>
  <text class="ts" x="400" y="154" text-anchor="middle" dominant-baseline="central">Unix domain socket</text>
</g>

<g class="node c-teal">
  <rect x="290" y="178" width="220" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="400" y="196" text-anchor="middle" dominant-baseline="central">module cache</text>
  <text class="ts" x="400" y="212" text-anchor="middle" dominant-baseline="central">Arc&lt;RwLock&lt;HashMap&gt;&gt;</text>
</g>

<g class="node c-teal">
  <rect x="290" y="236" width="220" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="400" y="254" text-anchor="middle" dominant-baseline="central">wasmtime engine</text>
  <text class="ts" x="400" y="270" text-anchor="middle" dominant-baseline="central">shared, static</text>
</g>

<g class="node c-teal">
  <rect x="290" y="294" width="220" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="400" y="312" text-anchor="middle" dominant-baseline="central">rquickjs runtime</text>
  <text class="ts" x="400" y="328" text-anchor="middle" dominant-baseline="central">JS/TS execution</text>
</g>

<!-- GAP 2: health + lifecycle -->
<rect x="284" y="347" width="232" height="18" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="400" y="356" text-anchor="middle" dominant-baseline="central" fill="#633806">⚠ gap: daemon lifecycle / health</text>

<!-- Client → Daemon arrow -->
<line x1="182" y1="164" x2="268" y2="164" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="225" y="156" text-anchor="middle">IPC</text>

<!-- Ephemeral instance zone -->
<g class="c-gray">
  <rect x="560" y="80" width="110" height="200" rx="10" stroke-width="0.5"/>
  <text class="th" x="615" y="105" text-anchor="middle" dominant-baseline="central">ephemeral</text>
</g>
<g class="node c-gray">
  <rect x="572" y="118" width="86" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="615" y="134" text-anchor="middle" dominant-baseline="central">Store</text>
  <text class="ts" x="615" y="150" text-anchor="middle" dominant-baseline="central">fresh per call</text>
</g>
<g class="node c-gray">
  <rect x="572" y="168" width="86" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="615" y="184" text-anchor="middle" dominant-baseline="central">WasiCtx</text>
  <text class="ts" x="615" y="200" text-anchor="middle" dominant-baseline="central">scoped lifetime</text>
</g>
<g class="node c-gray">
  <rect x="572" y="218" width="86" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="615" y="234" text-anchor="middle" dominant-baseline="central">Instance</text>
  <text class="ts" x="615" y="250" text-anchor="middle" dominant-baseline="central">dropped on close</text>
</g>

<!-- Daemon → Ephemeral -->
<line x1="512" y1="180" x2="560" y2="180" class="arr" marker-end="url(#arrow)"/>

<!-- Gap 3: API proxy -->
<g class="node c-coral">
  <rect x="270" y="440" width="260" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="400" y="460" text-anchor="middle" dominant-baseline="central">API proxy / HTTP server</text>
  <text class="ts" x="400" y="476" text-anchor="middle" dominant-baseline="central">not specified in PRD</text>
</g>
<rect x="264" y="494" width="272" height="18" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="400" y="503" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">⚠ gap: port binding, routing, auth</text>

<!-- Gap 4: non-daemon commands -->
<g class="node c-amber">
  <rect x="40" y="440" width="140" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="460" text-anchor="middle" dominant-baseline="central">standalone cmds</text>
  <text class="ts" x="110" y="476" text-anchor="middle" dominant-baseline="central">craft install, craft list</text>
</g>
<rect x="34" y="494" width="152" height="18" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="110" y="503" text-anchor="middle" dominant-baseline="central" fill="#633806">⚠ gap: cmd separation</text>

<!-- Gap 5: multi-tenant / auth -->
<g class="node c-pink">
  <rect x="40" y="550" width="530" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="305" y="570" text-anchor="middle" dominant-baseline="central">enterprise: auth, multi-tenant, audit log</text>
  <text class="ts" x="305" y="586" text-anchor="middle" dominant-baseline="central">not addressed in PRD</text>
</g>

<!-- Legend -->
<rect x="580" y="440" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="596" y="450" dominant-baseline="central">gap / missing</text>
<rect x="580" y="458" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="596" y="468" dominant-baseline="central">underspecified</text>
</svg>